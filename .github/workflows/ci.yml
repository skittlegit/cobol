name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master, track-a, track-b, track-c]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  offline-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # BL-8's manifest-provenance gate walks file history to identify the
          # generation commit; a shallow checkout makes a correct manifest fail.
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and development gates
        run: python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Run offline test suite
        run: python -m pytest tests/ -x -q
